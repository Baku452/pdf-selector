<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso — Renombrador de PDF</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f8f5f2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #222525;
        }

        .card {
            background: #fffffe;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
        }

        .icon { font-size: 2.5rem; margin-bottom: 12px; }

        h1 {
            font-size: 1.6rem;
            color: #232323;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 32px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0dbd6;
            border-radius: 10px;
            font-size: 1rem;
            color: #232323;
            background: #fafafa;
            transition: border-color 0.2s;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #078080;
            background: #fff;
        }

        .error {
            background: #fff0f0;
            border: 1px solid #fca5a5;
            color: #b91c1c;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.9rem;
            margin-top: 12px;
        }

        button[type="submit"] {
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            background: #078080;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button[type="submit"]:hover { background: #056060; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🔐</div>
        <h1>Renombrador de PDF</h1>
        <p class="subtitle">Ingresa la clave de acceso para continuar.</p>

        <form method="POST" action="/web-login">
            <label for="access_key">Clave de acceso</label>
            <input
                type="password"
                id="access_key"
                name="access_key"
                placeholder="••••••••••••"
                autocomplete="current-password"
                autofocus
            >
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}
            <button type="submit">Ingresar</button>
        </form>
    </div>
</body>
</html>
