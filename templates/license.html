<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activar licencia — Renombrador de PDF</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f8f5f2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #222525;
        }

        .card {
            background: #fffffe;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            padding: 48px 40px;
            width: 100%;
            max-width: 480px;
        }

        .icon { font-size: 2.5rem; margin-bottom: 12px; }

        h1 {
            font-size: 1.6rem;
            color: #232323;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0dbd6;
            border-radius: 10px;
            font-size: 1.05rem;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.08em;
            color: #232323;
            background: #fafafa;
            transition: border-color 0.2s;
            text-transform: uppercase;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #078080;
            background: #fff;
        }

        .error {
            background: #fff0f0;
            border: 1px solid #fca5a5;
            color: #b91c1c;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.9rem;
            margin-top: 12px;
        }

        button[type="submit"] {
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            background: #078080;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button[type="submit"]:hover { background: #056060; }

        .fingerprint-section {
            margin-top: 36px;
            padding-top: 28px;
            border-top: 1px solid #e0dbd6;
        }

        .fingerprint-section p {
            font-size: 0.88rem;
            color: #666;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .fingerprint-box {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .fingerprint-value {
            flex: 1;
            font-family: 'Courier New', monospace;
            font-size: 0.78rem;
            color: #444;
            background: #f3f0ed;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 8px 12px;
            word-break: break-all;
            line-height: 1.4;
        }

        .copy-btn {
            flex-shrink: 0;
            padding: 8px 14px;
            background: #f3f0ed;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            color: #444;
            transition: background 0.15s;
            white-space: nowrap;
        }

        .copy-btn:hover { background: #e8e3de; }
        .copy-btn.copied { background: #d1fae5; border-color: #6ee7b7; color: #065f46; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🔑</div>
        <h1>Activar licencia</h1>
        <p class="subtitle">
            Ingresa la clave de licencia que recibiste para activar
            <strong>Renombrador de PDF</strong> en este equipo.
        </p>

        <form method="POST" action="/activate">
            <label for="license_key">Clave de licencia</label>
            <input
                type="text"
                id="license_key"
                name="license_key"
                placeholder="XXXX-XXXX-XXXX-XXXX"
                maxlength="19"
                autocomplete="off"
                spellcheck="false"
                autofocus
            >
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}
            <button type="submit">Activar</button>
        </form>

        <div class="fingerprint-section">
            <p>
                Para obtener tu clave, comparte tu <strong>huella de máquina</strong>
                con el proveedor del software:
            </p>
            <div class="fingerprint-box">
                <span class="fingerprint-value" id="fp">{{ fingerprint }}</span>
                <button class="copy-btn" id="copyBtn" onclick="copyFP()">Copiar</button>
            </div>
        </div>
    </div>

    <script>
        // Auto-format input as XXXX-XXXX-XXXX-XXXX
        document.getElementById('license_key').addEventListener('input', function (e) {
            let v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            let formatted = v.match(/.{1,4}/g)?.join('-') ?? v;
            e.target.value = formatted.slice(0, 19);
        });

        function copyFP() {
            const fp = document.getElementById('fp').textContent;
            navigator.clipboard.writeText(fp).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.textContent = 'Copiado';
                btn.classList.add('copied');
                setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 2000);
            });
        }
    </script>
</body>
</html>
